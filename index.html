<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ferramenta automatizada de busca OSINT para localização de informações públicas.">
    <title>OSINT Scanner | Inteligência Digital</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-glow"></div>
    
    <main class="container">
        <header class="hero">
            <div class="badge">Automatic OSINT Scanner</div>
            <h1>OSINT <span>Scanner</span></h1>
            <p>Busca automatizada em fontes abertas e redes sociais.</p>
        </header>

        <section class="search-section">
            <div class="search-box-container">
                <div class="search-box">
                    <input type="text" id="target" placeholder="Digite o nome completo ou usuário..." autocomplete="off">
                    <div class="search-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    </div>
                </div>
                <button id="start-scan" class="btn-scan" onclick="startAutomatedScan()">
                    <span>Iniciar Varredura</span>
                    <div class="scan-loader" id="loader" style="display: none;"></div>
                </button>
            </div>
        </section>

        <!-- Scanning Status Console -->
        <section id="scan-console" class="scan-console" style="display: none;">
            <div class="console-header">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
                <span class="console-title">System Logs</span>
            </div>
            <div id="console-output" class="console-output"></div>
        </section>

        <!-- Results Section -->
        <section id="results-section" class="results-grid" style="display: none;">
            <div class="results-header">
                <h2>Resultados Encontrados</h2>
                <div class="results-line"></div>
            </div>
            <div id="results-container" class="results-container">
                <!-- Results will be injected here -->
            </div>
        </section>

        <footer class="footer">
            <p>&copy; 2024 OSINT Scanner. Use com responsabilidade.</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
