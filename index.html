<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ferramenta avançada de busca OSINT para localização de pessoas e informações públicas em múltiplas plataformas.">
    <title>OSINT Intelligence Dashboard | Busca Avançada</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-glow"></div>
    
    <main class="container">
        <header class="hero">
            <div class="badge">Open Source Intelligence</div>
            <h1>OSINT <span>Search</span></h1>
            <p>Localize informações públicas em segundos através de múltiplas bases de dados.</p>
        </header>

        <section class="search-section">
            <div class="search-box">
                <input type="text" id="target" placeholder="Digite o nome, usuário ou termo de busca..." autocomplete="off">
                <div class="search-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                </div>
                <button class="clear-btn" id="clear-search" onclick="document.getElementById('target').value=''; document.getElementById('target').focus();">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
            </div>
        </section>

        <section class="platforms-grid">
            <!-- Category: Social Media -->
            <div class="category-card">
                <div class="category-header">
                    <h3>Redes Sociais</h3>
                    <button class="btn-all" onclick="searchCategory(['instagram', 'linkedin', 'facebook', 'tiktok', 'twitter'])">Buscar Tudo</button>
                </div>
                <div class="button-group">
                    <button onclick="search('instagram')" class="btn-platform" id="btn-instagram">Instagram</button>
                    <button onclick="search('linkedin')" class="btn-platform" id="btn-linkedin">LinkedIn</button>
                    <button onclick="search('facebook')" class="btn-platform" id="btn-facebook">Facebook</button>
                    <button onclick="search('tiktok')" class="btn-platform" id="btn-tiktok">TikTok</button>
                    <button onclick="search('twitter')" class="btn-platform" id="btn-twitter">Twitter (X)</button>
                </div>
            </div>

            <!-- Category: Search Engines -->
            <div class="category-card">
                <div class="category-header">
                    <h3>Motores de Busca</h3>
                    <button class="btn-all" onclick="searchCategory(['google', 'bing', 'duckduckgo'])">Buscar Tudo</button>
                </div>
                <div class="button-group">
                    <button onclick="search('google')" class="btn-platform" id="btn-google">Google</button>
                    <button onclick="search('bing')" class="btn-platform" id="btn-bing">Bing</button>
                    <button onclick="search('duckduckgo')" class="btn-platform" id="btn-duckduckgo">DuckDuckGo</button>
                </div>
            </div>

            <!-- Category: Legal & Brazil -->
            <div class="category-card">
                <div class="category-header">
                    <h3>Jurídico & Brasil</h3>
                    <button class="btn-all" onclick="searchCategory(['jusbrasil', 'escavador', 'transparencia'])">Buscar Tudo</button>
                </div>
                <div class="button-group">
                    <button onclick="search('jusbrasil')" class="btn-platform" id="btn-jusbrasil">Jusbrasil</button>
                    <button onclick="search('escavador')" class="btn-platform" id="btn-escavador">Escavador</button>
                    <button onclick="search('transparencia')" class="btn-platform" id="btn-transparencia">Transparência</button>
                </div>
            </div>

            <!-- Category: Images & More -->
            <div class="category-card">
                <div class="category-header">
                    <h3>Imagens & Ferramentas</h3>
                    <button class="btn-all" onclick="searchCategory(['google_images', 'yandex', 'lattes'])">Buscar Tudo</button>
                </div>
                <div class="button-group">
                    <button onclick="search('google_images')" class="btn-platform" id="btn-gimages">Google Imagens</button>
                    <button onclick="search('yandex')" class="btn-platform" id="btn-yandex">Yandex Images</button>
                    <button onclick="search('lattes')" class="btn-platform" id="btn-lattes">Currículo Lattes</button>
                </div>
            </div>
        </section>

        <footer class="footer">
            <p>&copy; 2024 OSINT Intelligence Dashboard. Use com responsabilidade.</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
